name: Metrics
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: IanBaptista
          template: classic
          base: "" 
          config_timezone: America/Sao_Paulo
          
          
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          config_padding: 0, 8 + 8%
          
          output_action: commit
          committer_branch: main
          committer_message: "chore: update language metrics [skip ci]"
